<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Collaboration | CampusHub</title>
    <link rel="stylesheet" href="../../css/globals.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 2rem 3rem;
        }

        .sidebar {
            width: 280px;
            position: fixed;
            height: 100vh;
            background: rgba(15, 23, 42, 0.9);
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
        }

        .nav-link.active {
            background: var(--glass-accent);
            color: var(--text-main);
            border-left: 3px solid var(--primary);
        }

        .collab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .project-card {
            padding: 2rem;
            position: relative;
            border-radius: 20px;
            transition: 0.3s;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .skill-tag {
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.75rem;
            color: var(--accent);
        }

        .team-count {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            width: 500px;
            padding: 3rem;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo">CAMPUS<span class="neon-text">HUB</span></div>
        <ul style="list-style:none; padding:0; margin-top:2rem;">
            <li><a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="resource-hub.html" class="nav-link"><i class="fas fa-book"></i> Resource Hub</a></li>
            <li><a href="library.html" class="nav-link"><i class="fas fa-university"></i> Library Portal</a></li>
            <li><a href="canteen.html" class="nav-link"><i class="fas fa-utensils"></i> Smart Canteen</a></li>
            <li><a href="collab.html" class="nav-link active"><i class="fas fa-users"></i> Collaboration</a></li>
            <li><a href="payments.html" class="nav-link"><i class="fas fa-wallet"></i> Payments</a></li>
        </ul>
    </div>

    <main class="main-content">
        <header style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <h1>Campus <span class="neon-text">Collaboration</span></h1>
                <p style="color:var(--text-muted);">Find your next project team or share your own ideas with students
                    from all campuses.</p>
            </div>
            <button class="btn-primary" id="newProjectBtn"><i class="fas fa-plus"></i> Post Idea</button>
        </header>

        <section class="collab-grid" id="projectGrid">
            <!-- Projects dynamically loaded -->
        </section>
    </main>

    <!-- Post Project Modal -->
    <div class="modal" id="projectModal">
        <div class="glass-card modal-content">
            <h2 style="margin-bottom:2rem;">Post Project Idea</h2>
            <form id="projectForm">
                <div style="margin-bottom:1.5rem;">
                    <label style="display:block; margin-bottom:0.5rem; color:var(--text-muted);">Project Title</label>
                    <input type="text" id="pTitle" required
                        style="width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:10px; color:white;">
                </div>
                <div style="margin-bottom:1.5rem;">
                    <label style="display:block; margin-bottom:0.5rem; color:var(--text-muted);">Description</label>
                    <textarea id="pDesc" rows="4"
                        style="width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:10px; color:white;"></textarea>
                </div>
                <div style="margin-bottom:1.5rem;">
                    <label style="display:block; margin-bottom:0.5rem; color:var(--text-muted);">Required Skills (comma
                        separated)</label>
                    <input type="text" id="pSkills" placeholder="React, Node.js, Python"
                        style="width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:10px; color:white;">
                </div>
                <div style="display:flex; gap:1rem;">
                    <button type="submit" class="btn-primary" style="flex-grow:1;">Post Now</button>
                    <button type="button" class="btn-primary"
                        style="background:transparent; border:1px solid var(--glass-border);"
                        onclick="toggleModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/dashboard.js"></script>
    <script>
        const projectModal = document.getElementById('projectModal');
        const projectGrid = document.getElementById('projectGrid');
        const projectForm = document.getElementById('projectForm');

        function toggleModal() { projectModal.classList.toggle('active'); }
        document.getElementById('newProjectBtn').onclick = toggleModal;

        async function fetchProjects() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/projects', { headers: { 'x-auth-token': token } });
                const projects = await res.json();

                if (res.ok) {
                    projectGrid.innerHTML = '';
                    projects.forEach(p => {
                        const skills = p.requiredSkills[0].split(',').map(s => s.trim());
                        projectGrid.innerHTML += `
                            <div class="glass-card project-card animate-fade-in">
                                <h3 class="neon-text" style="font-size:1.2rem; margin-bottom:0.8rem;">${p.title}</h3>
                                <p style="color:var(--text-muted); font-size:0.95rem;">${p.description}</p>
                                <div class="skills-container">
                                    ${skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
                                </div>
                                <div class="team-count"><i class="fas fa-users"></i> ${p.teamMembers.length} Active Members</div>
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:2rem;">
                                    <span style="font-size:0.8rem; color:var(--primary);">By: ${p.ownerId.name}</span>
                                    <button class="btn-primary" style="padding:6px 15px; font-size:0.8rem;" onclick="joinProject('${p._id}')">Join Team</button>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (err) { console.error(err); }
        }

        projectForm.onsubmit = async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const projectData = {
                title: document.getElementById('pTitle').value,
                description: document.getElementById('pDesc').value,
                requiredSkills: [document.getElementById('pSkills').value]
            };

            try {
                const res = await fetch('/api/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
                    body: JSON.stringify(projectData)
                });
                if (res.ok) {
                    alert('Project Idea Posted!');
                    toggleModal();
                    fetchProjects();
                }
            } catch (err) { alert('Failed to post project'); }
        };

        async function joinProject(id) {
            const token = localStorage.getItem('token');
            const role = prompt('What is your proposed role for this project? (e.g. Frontend Dev, Designer)');
            if (!role) return;

            try {
                const res = await fetch(`/api/projects/join/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
                    body: JSON.stringify({ role })
                });
                if (res.ok) {
                    alert('Successfully joined the team! Collaborators will be notified.');
                    fetchProjects();
                } else {
                    const data = await res.json();
                    alert(data.message);
                }
            } catch (err) { alert('Server error joining project'); }
        }

        document.addEventListener('DOMContentLoaded', fetchProjects);
    </script>
</body>

</html>
