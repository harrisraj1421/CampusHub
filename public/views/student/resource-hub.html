<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Hub | CampusHub</title>
    <link rel="stylesheet" href="../../css/globals.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --nav-width: 280px;
        }

        body {
            background-color: var(--bg-color);
        }

        .sidebar {
            width: var(--nav-width);
            background: var(--sidebar-bg);
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            transition: transform 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            color: white;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.875rem 1rem;
            border-radius: 10px;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-link.active {
            background: var(--primary);
        }

        .top-header {
            height: 70px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 900;
        }

        .main-container {
            margin-left: var(--nav-width);
            transition: margin-left 0.3s ease;
            min-height: 100vh;
        }

        .main-container.expanded {
            margin-left: 0;
        }

        .page-content {
            padding: 2.5rem;
        }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .search-container {
            position: relative;
            max-width: 600px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            outline: none;
            transition: border 0.3s;
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        @media (max-width: 1024px) {
            .main-container {
                margin-left: 0;
            }

            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>
    <nav class="sidebar" id="sidebar">
        <div class="logo"
            style="font-size: 1.5rem; font-family: var(--font-heading); font-weight: 800; margin-bottom: 2.5rem; display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-graduation-cap" style="color: var(--accent);"></i>
            <span>CAMPUS<span style="color: var(--primary);">HUB</span></span>
        </div>
        <ul style="list-style: none; flex-grow: 1;">
            <li><a href="dashboard.html" class="nav-link"><i class="fas fa-th-large" style="width: 24px;"></i>
                    <span>Overview</span></a></li>
            <li><a href="resource-hub.html" class="nav-link active"><i class="fas fa-folder-open"
                        style="width: 24px;"></i> <span>Resources</span></a></li>
            <li><a href="library.html" class="nav-link"><i class="fas fa-book-reader" style="width: 24px;"></i>
                    <span>Library</span></a></li>
            <li><a href="canteen.html" class="nav-link"><i class="fas fa-utensils" style="width: 24px;"></i>
                    <span>Canteen</span></a></li>
            <li><a href="payments.html" class="nav-link"><i class="fas fa-credit-card" style="width: 24px;"></i>
                    <span>Billing</span></a></li>
            <li><a href="collab.html" class="nav-link"><i class="fas fa-project-diagram" style="width: 24px;"></i>
                    <span>Projects</span></a></li>
            <li><a href="events.html" class="nav-link"><i class="fas fa-calendar-star" style="width: 24px;"></i>
                    <span>Events</span></a></li>
        </ul>
        <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
            <a href="#" id="logoutBtn" class="nav-link" style="color: #ef4444;"><i class="fas fa-sign-out-alt"></i>
                <span>Sign Out</span></a>
        </div>
    </nav>

    <div class="main-container" id="mainContainer">
        <header class="top-header">
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <div class="hamburger" id="menuToggle" style="cursor: pointer; font-size: 1.25rem;"><i
                        class="fas fa-bars"></i></div>
                <h2 style="font-size: 1.25rem;">Resource Hub</h2>
            </div>
            <div
                style="display: flex; align-items: center; gap: 1rem; padding: 5px 12px; border-radius: 50px; border: 1px solid var(--border-light);">
                <span id="userNameDisplay" style="font-size: 0.9rem; font-weight: 600;">Student</span>
            </div>
        </header>

        <main class="page-content animate-in">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1>Explore Knowledge</h1>
                    <p style="color: var(--text-muted);">Access and share academic resources across campuses.</p>
                </div>
                <button class="btn btn-primary" id="uploadBtn"><i class="fas fa-plus"></i> Upload Resource</button>
            </div>

            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Search by subject, professor, or campus...">
            </div>

            <div class="resource-grid" id="resourceGrid">
                <!-- Resources loaded dynamically -->
                <p style="color: var(--text-muted);">Fetching resources...</p>
            </div>
        </main>
    </div>

    <script src="../../js/dashboard.js"></script>
    <script>
        // Hamburger Toggle
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const mainContainer = document.getElementById('mainContainer');

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            if (window.innerWidth > 1024) {
                sidebar.classList.toggle('collapsed');
                mainContainer.classList.toggle('expanded');
            }
        });

        // Load Resources
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            const grid = document.getElementById('resourceGrid');
            try {
                const res = await fetch('/api/resources', { headers: { 'x-auth-token': token } });
                const data = await res.json();
                if (data.length > 0) {
                    grid.innerHTML = data.map(item => `
                        <div class="card">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                                <span style="font-size: 0.7rem; font-weight: 700; color: var(--primary); text-transform: uppercase; background: var(--glass-accent); padding: 4px 8px; border-radius: 4px;">${item.category}</span>
                                <i class="fas fa-ellipsis-v" style="color: var(--text-muted); cursor: pointer;"></i>
                            </div>
                            <h3 style="font-size: 1.1rem; margin-bottom: 0.5rem;">${item.title}</h3>
                            <p style="color: var(--text-muted); font-size: 0.875rem; line-height: 1.5; margin-bottom: 1.5rem;">${item.description}</p>
                            <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid var(--border-light);">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <div style="width: 24px; height: 24px; border-radius: 50%; background: var(--border-light);"></div>
                                    <span style="font-size: 0.75rem; font-weight: 500;">Prof. Sharma</span>
                                </div>
                                <a href="${item.fileUrl}" target="_blank" class="btn btn-secondary" style="padding: 6px 10px; font-size: 0.8rem;"><i class="fas fa-download"></i></a>
                            </div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<p style="color: var(--text-muted);">No resources found. Be the first to upload!</p>';
                }
            } catch (err) { console.error(err); }
        });
    </script>
</body>

</html>
