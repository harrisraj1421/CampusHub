<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Hub | CampusHub</title>
    <link rel="stylesheet" href="../../css/globals.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 2rem 3rem;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .resource-card {
            padding: 1.5rem;
            position: relative;
        }

        .resource-tag {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            background: var(--glass-accent);
        }

        .sidebar {
            width: 280px;
            position: fixed;
            height: 100vh;
            background: rgba(15, 23, 42, 0.9);
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
        }

        .nav-link.active {
            background: var(--glass-accent);
            color: var(--text-main);
            border-left: 3px solid var(--primary);
        }

        .nav-link i {
            margin-right: 12px;
        }

        .search-bar {
            width: 100%;
            max-width: 600px;
            padding: 12px 20px;
            background: var(--glass-accent);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            outline: none;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo">CAMPUS<span class="neon-text">HUB</span></div>
        <ul style="list-style:none; padding:0; margin-top:2rem;">
            <li><a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="resource-hub.html" class="nav-link active"><i class="fas fa-book"></i> Resource Hub</a></li>
            <li><a href="library.html" class="nav-link"><i class="fas fa-university"></i> Library Portal</a></li>
            <li><a href="canteen.html" class="nav-link"><i class="fas fa-utensils"></i> Smart Canteen</a></li>
        </ul>
    </div>

    <main class="main-content">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
            <h1>Inter-Campus <span class="neon-text">Resource Hub</span></h1>
            <button class="btn-primary" id="uploadBtn"><i class="fas fa-plus"></i> Upload Note</button>
        </header>

        <div style="margin-bottom:2rem;">
            <input type="text" class="search-bar"
                placeholder="Search for notes, PDFs, or question papers across campuses...">
        </div>

        <div class="grid-3" id="resourceGrid">
            <!-- Dynamically loaded resources -->
            <div class="glass-card resource-card">
                <span class="resource-tag">Notes</span>
                <h3>Data Mining Unit 1-3</h3>
                <p style="color:var(--text-muted); font-size:0.9rem; margin:1rem 0;">Comprehensive handwritten notes
                    covering clustering, classification, and association rules.</p>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-size:0.85rem; color:var(--accent);"><i class="fas fa-star"></i> 4.8 (120 reviews)
                    </div>
                    <button class="btn-primary" style="padding:6px 12px; font-size:0.8rem;"><i
                            class="fas fa-download"></i></button>
                </div>
            </div>
        </div>
    </main>

    <script src="../../js/dashboard.js"></script>
    <script>
        // Resource-specific logic
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) return;

            try {
                const res = await fetch('/api/resources', {
                    headers: { 'x-auth-token': token }
                });
                const data = await res.json();
                if (res.ok && data.length > 0) {
                    const grid = document.getElementById('resourceGrid');
                    grid.innerHTML = '';
                    data.forEach(item => {
                        grid.innerHTML += `
                            <div class="glass-card resource-card">
                                <span class="resource-tag">${item.category}</span>
                                <h3>${item.title}</h3>
                                <p style="color:var(--text-muted); font-size:0.9rem; margin:1rem 0;">${item.description}</p>
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <div style="font-size:0.85rem; color:var(--accent);"><i class="fas fa-star"></i> ${item.ratings.length > 0 ? (item.ratings.reduce((a, b) => a + b.score, 0) / item.ratings.length).toFixed(1) : 'No ratings'}</div>
                                    <a href="${item.fileUrl}" target="_blank" class="btn-primary" style="padding:6px 12px; font-size:0.8rem;"><i class="fas fa-download"></i></a>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                console.error('Error fetching resources:', err);
            }
        });
    </script>
</body>

</html>
