<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Admin | CampusHub</title>
    <link rel="stylesheet" href="../../css/globals.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 2rem 3rem;
        }

        .sidebar {
            width: 280px;
            position: fixed;
            height: 100vh;
            background: rgba(15, 23, 42, 0.9);
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
        }

        .nav-link.active {
            background: var(--glass-accent);
            color: var(--text-main);
            border-left: 3px solid var(--primary);
        }

        .nav-link i {
            margin-right: 12px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            margin-top: 2rem;
        }

        .form-card {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .form-group input,
        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--glass-border);
            outline: none;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo">CAMPUS<span class="neon-text">HUB</span></div>
        <ul style="list-style:none; padding:0; margin-top:2rem;">
            <li><a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li><a href="library.html" class="nav-link active"><i class="fas fa-book"></i> Library Control</a></li>
            <li><a href="users.html" class="nav-link"><i class="fas fa-users-cog"></i> User Management</a></li>
            <li><a href="canteen.html" class="nav-link"><i class="fas fa-store"></i> Canteen Control</a></li>
        </ul>
    </div>

    <main class="main-content">
        <header>
            <h1>Library Management <span class="neon-text">System</span></h1>
            <p style="color:var(--text-muted);">Manage inventory and track borrowed books.</p>
        </header>

        <div class="admin-grid">
            <section class="glass-card form-card animate-fade-in">
                <h3 style="margin-bottom:1.5rem;"><i class="fas fa-plus-circle"></i> Add New Book</h3>
                <form id="addBookForm">
                    <div class="form-group">
                        <label>Book Title</label>
                        <input type="text" id="title" placeholder="Modern Operating Systems" required>
                    </div>
                    <div class="form-group">
                        <label>Author</label>
                        <input type="text" id="author" placeholder="Andrew S. Tanenbaum" required>
                    </div>
                    <div class="form-group" style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div>
                            <label>Category</label>
                            <select id="category">
                                <option value="Engineering">Engineering</option>
                                <option value="Design">Design</option>
                                <option value="Management">Management</option>
                                <option value="Science">Science</option>
                            </select>
                        </div>
                        <div>
                            <label>Campus</label>
                            <select id="campus">
                                <option value="Main Campus">Main Campus</option>
                                <option value="North Campus">North Campus</option>
                                <option value="South Campus">South Campus</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Total Copies</label>
                        <input type="number" id="totalCopies" value="1" min="1" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%;">Add to Inventory</button>
                </form>
            </section>

            <section class="glass-card form-card animate-fade-in" style="animation-delay:0.2s;">
                <h3 style="margin-bottom:1.5rem;"><i class="fas fa-clock"></i> Overdue Books</h3>
                <div id="overdueList" style="max-height: 480px; overflow-y: auto;">
                    <p style="color:var(--text-muted);">No overdue books found.</p>
                    <!-- Overdue books data will appear here -->
                </div>
            </section>
        </div>
    </main>

    <script src="../../js/dashboard.js"></script>
    <script>
        document.getElementById('addBookForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const bookData = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                category: document.getElementById('category').value,
                campus: document.getElementById('campus').value,
                totalCopies: parseInt(document.getElementById('totalCopies').value)
            };

            try {
                const res = await fetch('/api/library/books', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
                    body: JSON.stringify(bookData)
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Book added successfully!');
                    e.target.reset();
                } else {
                    alert(data.message || 'Error adding book');
                }
            } catch (err) {
                alert('Server error');
            }
        });

        async function fetchOverdue() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/library/overdue', { headers: { 'x-auth-token': token } });
                const data = await res.json();
                const overdueList = document.getElementById('overdueList');
                if (res.ok && data.length > 0) {
                    overdueList.innerHTML = '';
                    data.forEach(book => {
                        overdueList.innerHTML += `
                            <div class="glass-card" style="padding:1rem; margin-bottom:1rem; border-left:4px solid var(--error);">
                                <strong>${book.title}</strong>
                                <p style="font-size:0.85rem; color:var(--text-muted);">Borrower ID: ${book.dueDate ? 'N/A' : 'Check Log'}</p>
                                <p style="font-size:0.8rem; color:var(--error);">Due on: ${new Date(book.dueDate).toLocaleDateString()}</p>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                console.error(err);
            }
        }

        fetchOverdue();
    </script>
</body>

</html>
