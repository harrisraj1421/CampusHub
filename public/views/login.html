<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CampusHub</title>
    <link rel="stylesheet" href="../css/globals.css">
    <style>
        .auth-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        .auth-card h2 {
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-main);
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: rgba(124, 58, 237, 0.1);
        }

        .auth-links {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-links a {
            color: var(--accent);
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="glass-card auth-card">
            <h2>Welcome <span class="neon-text">Back</span></h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
            </form>
            <div class="auth-links">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
            <div style="margin-top: 1rem; text-align: center;">
                <a href="../index.html" style="font-size: 0.85rem; color: var(--text-muted); opacity: 0.7;">&larr; Back
                    to Home</a>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>

</html>
