<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | CampusHub</title>
    <link rel="stylesheet" href="../css/globals.css">
    <style>
        .auth-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
            padding: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        .auth-card h2 {
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-main);
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
            background: rgba(124, 58, 237, 0.1);
        }

        .form-group select option {
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .auth-links {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-links a {
            color: var(--accent);
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="glass-card auth-card">
            <h2>Start your <span class="neon-text">Journey</span></h2>
            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="john@example.edu" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a strong password" required>
                </div>
                <div class="form-group">
                    <label for="role">Your Role</label>
                    <select id="role" required>
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                        <option value="admin">Admin</option>
                        <option value="library">Library Staff</option>
                        <option value="canteen">Canteen Staff</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
            </form>
            <div class="auth-links">
                Already have an account? <a href="login.html">Log In</a>
            </div>
            <div style="margin-top: 1rem; text-align: center;">
                <a href="../index.html" style="font-size: 0.85rem; color: var(--text-muted); opacity: 0.7;">&larr; Back
                    to Home</a>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>

</html>
